<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Online Customer Service</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f7f8fa; }
        
        .woot-widget-bubble { display: none !important; }

        /* PC 畫面置中設定 */
        .woot-widget-holder { 
            top: 50% !important; 
            left: 50% !important; 
            transform: translate(-50%, -50%) !important; 
            width: 450px !important; 
            height: 90vh !important; 
            max-height: 800px !important; 
            box-shadow: 0 10px 50px rgba(0,0,0,0.1) !important; 
            border-radius: 12px !important; 
            overflow: hidden !important;
            right: auto !important;
            bottom: auto !important;
        }

        /* 隱藏原本的關閉按鈕圖示，並用偽元素寫一個「返回」文字 */
        /* 注意：這部分會根據 Chatwoot 版本不同，CSS Class 可能略有差異 */
        .woot-elements--close-button {
            background-image: none !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            width: auto !important;
            padding: 0 15px !important;
            text-decoration: none !important;
        }

        .woot-elements--close-button::before {
            content: "〈 返回" !important; /* 自定義文字 */
            color: #fff !important; /* 根據你的主題顏色調整 */
            font-size: 14px !important;
            font-weight: bold !important;
        }

        @media only screen and (max-width: 600px) {
            .woot-widget-holder {
                top: 0 !important;
                left: 0 !important;
                transform: none !important;
                width: 100% !important;
                height: 100% !important;
                max-height: 100vh !important;
                border-radius: 0 !important;
            }
        }
    </style>
</head>
<body>
    <script>
      (function(d,t) {
          window.chatwootSettings = {
            locale: 'vi',             // 強制越南語
            useBrowserLanguage: false, // 禁用瀏覽器語系自動偵測 (這最重要)
            type: 'expanded_bubble'
          };
          
          var BASE_URL="https://xiongguide.com";
          var g=d.createElement(t),s=d.getElementsByTagName(t)[0];
          g.src=BASE_URL+"/packs/js/sdk.js";
          g.async = true;
          s.parentNode.insertBefore(g,s);
          g.onload=function(){
            window.chatwootSDK.run({
              websiteToken: 'X8wKz4jL2ha5ae3sU3BcRaLu',
              baseUrl: BASE_URL,
              type: 'expanded_bubble' 
            });
        
            window.addEventListener('chatwoot:ready', function () {
              window.$chatwoot.toggle('open');
        
              // 使用事件委派 (Event Delegation)
              // 這樣即便按鈕是後來才長出來的，點擊 body 也能抓到它
              document.addEventListener('click', function (e) {
                // 尋找點擊目標是否為 .close-button 或其內部的 SVG/Path
                var closeBtn = e.target.closest('.close-button');
                
                if (closeBtn) {
                  console.log("成功攔截到關閉按鈕點擊！");
                  
                  // 阻止 Chatwoot 原本的關閉邏輯
                  e.preventDefault();
                  e.stopPropagation();
        
                  // 執行返回或導向首頁
                  if (document.referrer !== "" && document.referrer.includes(window.location.hostname)) {
                    window.history.back();
                  } else {
                    window.location.href = "https://xiongguide.com";
                  }
                }
              }, true); // 使用 Capture 模式優先攔截
            });
          }
        })(document,"script");
    </script>
</body>
</html>
